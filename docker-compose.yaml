services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:14.4
    ports:
      - "5444:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  test:
    image: postgres:14.4
    ports:
      - "5445:5432"
    env_file:
      - .env_test
    volumes:
      - test_postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  test_postgres_data: